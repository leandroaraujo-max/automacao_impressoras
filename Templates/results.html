<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Impressoras</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 24px 20px 60px; }
        .topbar { display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto 20px; flex-wrap: wrap; gap: 12px; }
        .topbar h1 { font-size: 1.25rem; font-weight: 700; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
        .topbar-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; border-radius: 8px; font-size: .84rem; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s, transform .1s; }
        .btn:hover { opacity: .85; }
        .btn:active { transform: scale(.97); }
        .btn-back  { background: #1a1d27; border: 1px solid #2d3148; color: #94a3b8; text-decoration: none; }
        .btn-export { background: #0f2a1a; border: 1px solid #1a5c30; color: #4ade80; }
        .btn-stop  { background: #7f1d1d; color: #fca5a5; }
        .btn-stop.hidden { display: none; }
        .btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .banner { max-width: 1400px; margin: 0 auto 22px; background: #1a2035; border: 1px solid #2d4a8a; border-radius: 10px; padding: 12px 18px; display: flex; align-items: center; gap: 12px; color: #93c5fd; font-size: .875rem; }
        .banner.done    { background: #0f2a1a; border-color: #1a5c30; color: #4ade80; }
        .banner.stopped { background: #2a1a0a; border-color: #7c3a0a; color: #fb923c; }
        .spinner { width: 15px; height: 15px; border: 2px solid #2d4a8a; border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
        .banner.done .spinner, .banner.stopped .spinner { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .filters-bar { max-width: 1400px; margin: 0 auto 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 3px; }
        .filter-group label { font-size: .7rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
        .filter-input, .filter-select { background: #1a1d27; border: 1px solid #2d3148; border-radius: 7px; color: #e2e8f0; padding: 6px 10px; font-size: .82rem; min-width: 140px; outline: none; transition: border-color .15s; }
        .filter-input:focus, .filter-select:focus { border-color: #3b82f6; }
        .filter-select option { background: #1a1d27; }
        .btn-clear-filter { background: #1a1d27; border: 1px solid #2d3148; color: #64748b; padding: 6px 14px; border-radius: 7px; font-size: .8rem; cursor: pointer; }
        .btn-clear-filter:hover { color: #e2e8f0; border-color: #475569; }
        .stats-bar { max-width: 1400px; margin: 0 auto 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        .stat-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 12px 20px; display: flex; flex-direction: column; gap: 2px; min-width: 130px; }
        .stat-label { font-size: .7rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
        .stat-value.blue { color: #60a5fa; } .stat-value.amber { color: #fbbf24; } .stat-value.green { color: #4ade80; }
        .expand-bar { max-width: 1400px; margin: 0 auto 14px; display: flex; gap: 10px; align-items: center; }
        .btn-toggle { background: #1a1d27; border: 1px solid #2d3148; color: #64748b; padding: 5px 14px; border-radius: 7px; font-size: .78rem; cursor: pointer; }
        .btn-toggle:hover { color: #e2e8f0; border-color: #475569; }
        .visible-count { font-size: .78rem; color: #64748b; margin-left: auto; }
        .content { max-width: 1400px; margin: 0 auto; }
        .cd-group { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .cd-group.hidden { display: none; }
        .cd-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; cursor: pointer; user-select: none; transition: background .15s; gap: 12px; }
        .cd-header:hover { background: #1f2235; }
        .cd-header-left { display: flex; align-items: center; gap: 14px; }
        .cd-title { font-size: .95rem; font-weight: 700; color: #f1f5f9; }
        .cd-tags { display: flex; gap: 7px; flex-wrap: wrap; }
        .tag { font-size: .7rem; font-weight: 700; padding: 2px 9px; border-radius: 20px; border: 1px solid; text-transform: uppercase; letter-spacing: .5px; }
        .tag-blue  { background: #1a2a4a; border-color: #2d4a8a; color: #60a5fa; }
        .tag-amber { background: #2a1f0a; border-color: #7c5a0a; color: #fbbf24; }
        .cd-chevron { color: #64748b; transition: transform .2s; flex-shrink: 0; }
        .cd-group.collapsed .cd-chevron { transform: rotate(-90deg); }
        .cd-body { overflow: hidden; }
        .cd-group.collapsed .cd-body { display: none; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: #141720; }
        th { padding: 10px 14px; text-align: left; font-size: .68rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid #2d3148; white-space: nowrap; }
        td { padding: 10px 14px; font-size: .835rem; color: #cbd5e1; border-bottom: 1px solid #1e2233; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #1f2235; }
        .cell-ip { font-family: "Cascadia Code", Consolas, monospace; color: #38bdf8; font-size: .82rem; }
        .probe-lnk { font-size: .8rem; margin-left: 6px; text-decoration: none; opacity: .3; transition: opacity .15s; vertical-align: middle; }
        .probe-lnk:hover { opacity: 1; }
        .badge-mfr { display: inline-block; padding: 2px 9px; border-radius: 6px; font-size: .72rem; font-weight: 700; border: 1px solid; white-space: nowrap; }
        .mfr-hp        { background: #0c2044; color: #60a5fa; border-color: #1e3a6e; }
        .mfr-samsung   { background: #0a1f3a; color: #38bdf8; border-color: #164e7a; }
        .mfr-zebra     { background: #1a1208; color: #fbbf24; border-color: #5a3e08; }
        .mfr-honeywell { background: #1a0a0a; color: #f87171; border-color: #5a1414; }
        .cell-serial { font-family: "Cascadia Code", Consolas, monospace; font-size: .78rem; color: #94a3b8; }
        .cell-serial.na { color: #374151; font-style: italic; }
        .cell-contador { font-family: "Cascadia Code", Consolas, monospace; font-size: .82rem; color: #34d399; font-weight: 600; }
        .cell-contador.na { color: #374151; font-style: italic; font-weight: 400; }
        .tipo-badge { font-size: .68rem; font-weight: 700; padding: 1px 7px; border-radius: 5px; border: 1px solid; text-transform: uppercase; }
        .tipo-laser   { background: #1a2a4a; color: #60a5fa; border-color: #2d4a8a; }
        .tipo-termica { background: #2a1f0a; color: #fbbf24; border-color: #7c5a0a; }
        .status-online { display: inline-flex; align-items: center; gap: 5px; font-size: .78rem; font-weight: 600; color: #4ade80; }
        .status-online::before { content: ""; width: 7px; height: 7px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 6px #4ade80; }
        .row-hidden { display: none; }
        .empty-msg { padding: 28px; text-align: center; color: #4a5568; font-size: .85rem; font-style: italic; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .new-row { animation: fadeIn .2s ease forwards; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>&#128424;&#160;Dashboard de Impressoras</h1>
    <div class="topbar-actions">
        <button id="btn-stop" class="btn btn-stop hidden" onclick="stopScan()">
            <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            Parar Scan
        </button>
        <button class="btn btn-export" onclick="exportCSV()">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar CSV
        </button>
        <a href="/" class="btn btn-back">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Novo Scan
        </a>
    </div>
</div>

<div class="banner" id="banner">
    <div class="spinner"></div>
    <span id="banner-text">Aguardando inicio do scan...</span>
</div>

<div class="stats-bar">
    <div class="stat-card"><span class="stat-label">Total</span><span class="stat-value" id="stat-total">0</span></div>
    <div class="stat-card"><span class="stat-label">Laser</span><span class="stat-value blue" id="stat-laser">0</span></div>
    <div class="stat-card"><span class="stat-label">Termica</span><span class="stat-value amber" id="stat-termica">0</span></div>
    <div class="stat-card"><span class="stat-label">CDs</span><span class="stat-value green" id="stat-cds">0</span></div>
</div>

<div class="filters-bar">
    <div class="filter-group"><label>IP</label><input type="text" id="f-ip" class="filter-input" placeholder="Ex: 10.0.1" oninput="applyFilters()"></div>
    <div class="filter-group"><label>CD / Filial</label><input type="text" id="f-cd" class="filter-input" placeholder="Ex: 350" oninput="applyFilters()"></div>
    <div class="filter-group"><label>Fabricante</label>
        <select id="f-fab" class="filter-select" onchange="applyFilters()">
            <option value="">Todos</option>
            <option value="HP">HP</option>
            <option value="Samsung">Samsung</option>
            <option value="Zebra">Zebra</option>
            <option value="Honeywell">Honeywell</option>
        </select>
    </div>
    <div class="filter-group"><label>Tipo</label>
        <select id="f-tipo" class="filter-select" onchange="applyFilters()">
            <option value="">Todos</option>
            <option value="laser">Laser</option>
            <option value="termica">Termica</option>
        </select>
    </div>
    <div class="filter-group"><label>Serial</label><input type="text" id="f-serial" class="filter-input" placeholder="Parte do serial" oninput="applyFilters()"></div>
    <button class="btn-clear-filter" onclick="clearFilters()">x Limpar filtros</button>
</div>

<div class="expand-bar">
    <button class="btn-toggle" onclick="setAllGroups(false)">Expandir todos</button>
    <button class="btn-toggle" onclick="setAllGroups(true)">Minimizar todos</button>
    <span class="visible-count" id="visible-count"></span>
</div>

<div class="content" id="content"></div>

<script>
'use strict';
var knownIPs = new Set();
var allPrinters = [];
var pollInterval = null;

function fmt(val) { return (val && val !== 'N/A' && val !== 'None' && val !== 'null') ? val : '\u2014'; }
function mfrClass(mfr) { return 'mfr-' + mfr.toLowerCase(); }

function makeRow(p) {
    var tr = document.createElement('tr');
    tr.dataset.ip = p.ip; tr.dataset.fab = p.fabricante;
    tr.dataset.tipo = p.tipo; tr.dataset.cd = p.filial;
    tr.dataset.serial = (p.serial || '').toLowerCase();
    tr.classList.add('new-row');
    var contClass   = (p.contador && p.contador !== 'None') ? 'cell-contador' : 'cell-contador na';
    var serialClass = (p.serial && p.serial !== 'N/A' && p.serial !== 'None') ? 'cell-serial' : 'cell-serial na';
    var tipoClass   = p.tipo === 'laser' ? 'tipo-laser' : 'tipo-termica';
    tr.innerHTML =
        '<td><span class="cell-ip">' + p.ip + '</span><a href="/probe?ip=' + p.ip + '" target="_blank" class="probe-lnk" title="Diagnosticar conectividade">&#128269;</a></td>' +
        '<td><span class="badge-mfr ' + mfrClass(p.fabricante) + '">' + p.fabricante + '</span></td>' +
        '<td><span class="' + serialClass + '">' + fmt(p.serial) + '</span></td>' +
        '<td><span class="' + contClass + '">' + fmt(p.contador) + '</span></td>' +
        '<td><span class="tipo-badge ' + tipoClass + '">' + p.tipo + '</span></td>' +
        '<td><span class="status-online">Online</span></td>';
    return tr;
}

function getOrCreateGroup(cd) {
    var id = 'grp-cd-' + cd;
    var grp = document.getElementById(id);
    if (grp) return grp;
    grp = document.createElement('div');
    grp.className = 'cd-group'; grp.id = id; grp.dataset.cd = cd;
    grp.innerHTML =
        '<div class="cd-header" onclick="toggleGroup(\'' + id + '\')">' +
            '<div class="cd-header-left">' +
                '<span class="cd-title">CD ' + cd + '</span>' +
                '<div class="cd-tags">' +
                    '<span class="tag tag-blue"  id="' + id + '-lc">0 laser</span>' +
                    '<span class="tag tag-amber" id="' + id + '-tc">0 termicas</span>' +
                '</div>' +
            '</div>' +
            '<svg class="cd-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
        '</div>' +
        '<div class="cd-body"><div class="table-wrap"><table>' +
            '<thead><tr><th>IP</th><th>Fabricante</th><th>N de Serie</th><th>Contador</th><th>Tipo</th><th>Status</th></tr></thead>' +
            '<tbody id="' + id + '-tbody"></tbody>' +
        '</table></div></div>';
    document.getElementById('content').appendChild(grp);
    return grp;
}

function updateGroupCounts(cd) {
    var id = 'grp-cd-' + cd;
    var tbody = document.getElementById(id + '-tbody');
    if (!tbody) return;
    var laser = 0, termica = 0;
    tbody.querySelectorAll('tr').forEach(function(r) { if (r.dataset.tipo === 'laser') laser++; else termica++; });
    var el = document.getElementById(id + '-lc'); if (el) el.textContent = laser + ' laser';
    var et = document.getElementById(id + '-tc'); if (et) et.textContent = termica + ' termicas';
}

function appendPrinter(p) {
    if (knownIPs.has(p.ip)) return;
    knownIPs.add(p.ip); allPrinters.push(p);
    var tbody = document.getElementById('grp-cd-' + p.filial + '-tbody');
    if (!tbody) { getOrCreateGroup(p.filial); tbody = document.getElementById('grp-cd-' + p.filial + '-tbody'); }
    tbody.appendChild(makeRow(p));
    updateGroupCounts(p.filial);
    updateStats();
    // applyFilters chamado só no final do poll, não a cada impressora
}

function updateStats() {
    var laser   = allPrinters.filter(function(p){return p.tipo==='laser';}).length;
    var termica = allPrinters.filter(function(p){return p.tipo==='termica';}).length;
    var cds     = new Set(allPrinters.map(function(p){return p.filial;})).size;
    document.getElementById('stat-total').textContent   = allPrinters.length;
    document.getElementById('stat-laser').textContent   = laser;
    document.getElementById('stat-termica').textContent = termica;
    document.getElementById('stat-cds').textContent     = cds;
}

function applyFilters() {
    var fIp     = document.getElementById('f-ip').value.trim().toLowerCase();
    var fCd     = document.getElementById('f-cd').value.trim().toLowerCase();
    var fFab    = document.getElementById('f-fab').value.toLowerCase();
    var fTipo   = document.getElementById('f-tipo').value.toLowerCase();
    var fSerial = document.getElementById('f-serial').value.trim().toLowerCase();
    var visTotal = 0;
    document.querySelectorAll('.cd-group').forEach(function(grp) {
        var vis = 0;
        grp.querySelectorAll('tbody tr').forEach(function(tr) {
            var show = true;
            if (fIp     && !tr.dataset.ip.toLowerCase().includes(fIp))      show = false;
            if (fCd     && !tr.dataset.cd.toLowerCase().includes(fCd))      show = false;
            if (fFab    && tr.dataset.fab.toLowerCase() !== fFab)            show = false;
            if (fTipo   && tr.dataset.tipo.toLowerCase() !== fTipo)          show = false;
            if (fSerial && !tr.dataset.serial.includes(fSerial))             show = false;
            tr.classList.toggle('row-hidden', !show);
            if (show) vis++;
        });
        visTotal += vis;
        grp.classList.toggle('hidden', vis === 0);
    });
    document.getElementById('visible-count').textContent = visTotal > 0 ? visTotal + ' impressora(s) exibida(s)' : '';
}

function clearFilters() {
    ['f-ip','f-cd','f-serial'].forEach(function(id){ document.getElementById(id).value = ''; });
    document.getElementById('f-fab').value = '';
    document.getElementById('f-tipo').value = '';
    applyFilters();
}

function toggleGroup(id) { var g = document.getElementById(id); if (g) g.classList.toggle('collapsed'); }
function setAllGroups(c) { document.querySelectorAll('.cd-group').forEach(function(g){ g.classList.toggle('collapsed', c); }); }

function stopScan() {
    var b = document.getElementById('btn-stop');
    b.disabled = true; b.textContent = 'Parando...';
    fetch('/scan/stop', {method:'POST'}).catch(function(){});
}

function exportCSV() {
    var fCd  = document.getElementById('f-cd').value.trim();
    var fFab = document.getElementById('f-fab').value.trim();
    var params = new URLSearchParams();
    if (fCd)  params.set('cd', fCd);
    if (fFab) params.set('fabricante', fFab);
    var url = '/api/export-csv' + (params.toString() ? '?' + params.toString() : '');
    var a = document.createElement('a');
    a.href = url; a.download = ''; a.style.display = 'none';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function poll() {
    try {
        var data = await (await fetch('/api/results')).json();
        var hadNew = false;
        data.printers.forEach(function(p) {
            if (!knownIPs.has(p.ip)) { appendPrinter(p); hadNew = true; }
        });
        if (hadNew) applyFilters();
        var banner = document.getElementById('banner');
        var txt    = document.getElementById('banner-text');
        var btnStop = document.getElementById('btn-stop');
        if (data.scan_running) {
            banner.className = 'banner';
            txt.textContent = 'Scan em andamento \u2014 ' + data.total + ' impressora(s) identificada(s)...';
            btnStop.classList.remove('hidden');
        } else {
            btnStop.classList.add('hidden');
            clearInterval(pollInterval);
            if (data.stop_requested) {
                banner.className = 'banner stopped';
                txt.textContent = 'Scan interrompido \u2014 ' + data.total + ' impressora(s) encontrada(s).';
            } else {
                banner.className = 'banner done';
                txt.textContent = 'Scan concluido \u2014 ' + data.total + ' impressora(s) encontrada(s).';
            }
            if (data.total === 0)
                document.getElementById('content').innerHTML = '<div class="empty-msg">Nenhuma impressora encontrada nas redes configuradas.</div>';
        }
    } catch(e) { console.error('Erro no polling:', e); }
}

poll();
pollInterval = setInterval(poll, 3000);
</script>
</body>
</html>
